<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./TicTacToeIcon.jpg">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>
<body onload="init()">
    <h1>Tic Tac Toe</h1>
    <div class="NamePlayer">
        <input id="playerX" type="text" placeholder="Name für Kreuz (x)" style="padding:6px; border-radius:6px; border:1px solid #ccc;">
        <input id="playerO" type="text" placeholder="Name für Kreis (o)" style="padding:6px; border-radius:6px; border:1px solid #ccc;">
        <button onclick="saveNames()">Namen speichern</button>
    </div>
    <div id="reset-area" style="display:none;">
        <button class="reset" onclick="resetGame()">Reset</button>
    </div>
    <audio id="applause-audio" src="applause.mp3"></audio>
    <div id="game-area" style="display:none;">
        <div class="game-layout">
            <div class="player-name left hidden" id="name-x"></div>
            <div class="tiktak">
                <div id="content"></div>
            </div>
            <div class="player-name right hidden" id="name-o"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
